body:
  text: 金籙解壇儀金籙設醮儀金籙放生儀金籙解壇儀法事如式各禮師存念如法請宣神呪東方東方九氣始皇青天碧霞鬱壘中有老人總校圖録攝氣舉仙南方南方丹天赤帝玉堂中有大神號曰赤皇上炎流煙三氣勃光神仙受命應會太陽西方西方素天白帝七門金靈晧映大華流氛白石峩峩七氣絪緼上有始生皇老大神總領肺氣主校九天檢定圖録制召上仙北方北方玄天五氣徘徊中有黑帝雙皇太微總領符命仙鍊八威青裙羽襡龍文鳯衣上帝所舉制到玉階中央中央總靈黃上天元始生五老中黃高尊攝氣監真總領羣仙典録玄圖宿簡玉文催運上氣普告萬神鳴法鼓二十四通無上三天玄元始三氣太上老君召出臣身中三五功曹左右官使者左右捧香驛龍騎吏侍香金童傳言散花玉女五帝直符直日香官各三十六人出出者嚴裝顯服冠帶垂纓關啓玄壇土地方域神真臣今解壇散席進愫言功欽奉其諸丹悃具載緘謄願得太上至真道氣靈寶瑞光下降流入臣等身中令臣所啓之誠速逹徑御至真無極大道三清上聖昊天至尊金闕玉皇上帝御前請稱法位具位臣姓某等今故燒香皈身皈神皈命太上十方靈寶自然至真無極大道臣聞三籙垂科五篇著範茂弘道旨丕闡玄風法天像地而肇建壇儀呼隂召陽而鎮安雲篆千真降駕萬聖臨軒齋盟上格於層霄真馭下臨於法席祈天永命集福延禧今則啓願告成朝修竣事解壇散席首過陳情祈降嘉祥尊安宗社金龍起篆慶圎滿於醮功玉緯流光降洪厖之景福所啓玄感上徹徑御至真無極大道御前禮方懴悔臣法衆等志心皈身皈神皈命十方無極大道太上靈寶天尊恭望洪慈洞垂巨澤普降洪恩以今解席告齋焚香禮聖臣聞經傳玉局玄靈啓度厄之儀教演金科紫極許禱祈之請臣等欽奉綸音崇修金籙茂集鴻禧開建蘭場敷揚玄範慮陟降有乖於密勿恐存神罔合於精修茲當解席之期庸致首愆之禱恭望四司五帝特寬宥過之恩九府三官誕布滌瑕之澤功圎果備地久天長萬願克從一誠昭徹臣等志心稽首禮謝無上正真三寶三啓三禮起真丈重稱法位具位臣姓某重誠上啓太上無極大道元始天尊太上道君太上老君無上玄老十方靈寶天尊巳得道大聖衆至真諸君丈人三十六部尊經玄中大法師三天大法師上相上宰上保上傅四師五帝星宮斗府河漢羣真三界官屬一切威靈臣等猥以宿緣恭逢聖運今則朝修禮畢奏對儀周集此良因上祝皇圖天廣聖德日新睿算齊箕翼之年中壼固岡陵之壽宗藩維屏儲嗣延禧宰輔明良人民樂育恭願宸情上逹景貺下臨邦畿懋輯於休徴宗社協符於元吉臣等遵依科範啓建清壇齎信質心法天像地六朝行道一念皈真果滿功圎諸天復位臣等所佩官將及臨壇效職一切威靈宣通召命營衛齋修並有勳績謹為言功進呈素悃依格遷賞特乞慈容所有表文謹當宣奏宣表回將牒焚化十二願存神燒香香官使者左右龍虎君侍香諸靈官當令臣向來解壇散席之所自然生金液丹碧芝英百靈衆真交會在此香火爐前上願十方仙童玉女接侍蘭煙傳臣向來所啓之誠速逹徑御至真無極大道三清上聖昊天至尊金闕玉皇上帝御前出堂頌下壇都門外立辭三寶朝修巳畢奏對云周道冠虛無恩覃海宇皇圖地久聖壽天齊和稽首拜辭十方道寶金童進善玉女奏功名挂金牌經藏寶韞尊安皇極慶集邦畿和稽首拜辭十方經寶鍾息響寶篆消煙師返太清福流家國玄風廣布道化興行和稽首拜辭十方師寶願諸衆生諸惡莫作衆善奉行不墮業緣常居盛世有情含識同證無為和稽首拜辭十方衆聖向來引班詣靜默堂謝師金籙解壇儀
